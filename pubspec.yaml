name: farmer_registration
description: "Farmer Registration App with green agriculture theme and Firebase backend."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  cloud_firestore: ^5.0.0

  # State Management
  provider: ^6.1.2

  # Maps & Location
  google_maps_flutter: ^2.5.0
  geolocator: ^12.0.0

  # UI / OTP Input
  pinput: ^5.0.0
  flutter_spinkit: ^5.2.1
  cached_network_image: ^3.3.0
  fluttertoast: ^8.2.4

  # Utilities
  intl: ^0.19.0
  image_picker: ^1.1.0
  permission_handler: ^11.3.1
  uuid: ^4.4.0
  http: ^1.2.0
  flutter_dotenv: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
