name: farmer_registration
description: "Greenated App with green agriculture theme and API backend."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State Management
  provider: ^6.1.2

  # Maps & Location
  google_maps_flutter: ^2.5.0
  geolocator: ^12.0.0

  # UI / OTP Input
  pinput: ^5.0.0
  flutter_spinkit: ^5.2.1
  cached_network_image: ^3.3.0


  # Utilities
  intl: ^0.20.2
  image_picker: ^1.1.0
  permission_handler: ^11.3.1
  uuid: ^4.5.3
  http: ^1.2.0
  flutter_dotenv: ^5.1.0
  package_info_plus: ^8.2.1
  shared_preferences: ^2.5.4
  camera: ^0.12.0+1
  geocoding: ^4.0.0
  path_provider: ^2.1.5
  share_plus: ^10.0.0
  image: ^4.8.0
  gal: ^2.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_logo.png"
  min_sdk_android: 21
  web:
    generate: false
  windows:
    generate: false

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/images/
    - assets/icons/
